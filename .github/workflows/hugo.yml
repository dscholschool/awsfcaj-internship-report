name: Deploy Hugo site to GitHub Pages

on: #sự kiện kích hoạt khi:
  push: #mỗi khi sự kiện này xuất hiện, check thay đổi của:
    branches: #nhánh chỉ định để theo dõi thay đổi:
      - main

  # Cho phép bạn chạy workflow này thủ công từ tab Actions
  workflow_dispatch:

# Cấp quyền cho GITHUB_TOKEN để cho phép deploy lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ cho phép một lần deploy đồng thời, hủy các lần chạy đang chờ trong hàng đợi.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job để build website
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Cực kỳ quan trọng để GitHub kéo theme về
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2 #Sử dụng action peaceiris/actions-hugo@v2 để cài đặt Hugo.
        with:
          hugo-version: "0.160.1" #cũ là 0.134.3
          extended: true #cần thiết cho việc xử lý các file SASS/SCSS mà nhiều theme (bao gồm hugo-theme-learn) sử dụng.

      - name: Build website
        run: hugo --minify #Lệnh để build website, đọc tất cả file markdown, template và tối ưu hóa với --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: ./public

  # Job để deploy
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


















